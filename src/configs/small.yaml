seed: 1234
# torch_home: /path/to/torch
num_workers: 1

dataset:
  name: DG_Dataset
  DG_Dataset:
    use_LMDB: False
    LMDB_root: /path/to/lmdb_database
    train_pos_list1_path: ../data/processed/meta_lists_small_basic/train_small_2_pos.txt
    train_neg_list1_path: ../data/processed/meta_lists_small_basic/train_small_2_neg.txt
    train_pos_list2_path: ../data/processed/meta_lists_small_basic/train_small_2_pos.txt
    train_neg_list2_path: ../data/processed/meta_lists_small_basic/train_small_2_neg.txt
    train_pos_list3_path: ../data/processed/meta_lists_small_basic/train_small_3_pos.txt
    train_neg_list3_path: ../data/processed/meta_lists_small_basic/train_small_3_neg.txt
    val_pos_list_path: ../data/processed/meta_lists_small_basic/val_small_mixed_pos.txt
    val_neg_list_path: ../data/processed/meta_lists_small_basic/val_small_mixed_neg.txt
    test_pos_list_path: ../data/processed/meta_lists_small_basic/test_small_mixed_pos.txt
    test_neg_list_path: ../data/processed/meta_lists_small_basic/test_small_mixed_neg.txt
    img_mode: rgb_hsv
    depth_map: True
    depth_map_size: 32
    crop_face_from_5points: False
    margin: 2
    return_path: True

transform:
  image_size: 256
  mean: [0.5, 0.5, 0.5]
  std: [0.5, 0.5, 0.5]
  num_segments: 2

model:
  name: Framework
  ckpt_path:
  resume:
  params:
    in_ch: 6
    mid_ch: 384
    AdapNorm: True
    AdapNorm_attention_flag: 1layer
    model_initial: kaiming

loss:
  name: CrossEntropyLoss
  weight: 1.0
  params:
    reduction: mean

loss_2:
  name: MSELoss
  weight: 0.1
  params:
    reduction: mean

loss_3:
  name: EuclideanLoss
  domain_weight: 0.001
  discri_weight: 0.001
  params:
    reduction: mean

optimizer:
  name: Adam
  params:
    lr: 0.0001
    weight_decay: 0.00001

scheduler:
  name: StepLR
  params:
    step_size: 20
    gamma: 0.5

train:
  epochs: 1
  batch_size: 8
  print_interval: 10
  metasize: 2
  meta_step_size: 0.0001

val:
  batch_size: 8

test:
  batch_size: 8
  record_results: True

wandb:
  project: ANRL
  group: small
  mode: offline
  job_type:
  id:
  resume:
  save_code: True
  name:
  notes:
